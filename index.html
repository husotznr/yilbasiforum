<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyav's Anı Duvarı</title>
    
    <link rel="icon" type="image/png" href="kedi.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --text-main: #fffbeb;
            --card-bg: rgba(20, 10, 5, 0.95);
            --accent: #f59e0b;
            --dislike: #ef4444;
            --muted: #a8a29e;
            --border-radius: 12px;
            --comment-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
            background-color: #000; color: var(--text-main);
            overflow-x: hidden;
        }

        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -3; transform: translate(-50%, -50%);
            object-fit: cover; background-size: cover;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        #snow-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .container {
            position: relative; z-index: 1;
            width: 100%; max-width: 600px;
            padding: 80px 20px 100px 20px;
        }

        header { text-align: center; margin-bottom: 40px; }
        header h1 {
            font-size: 3rem; margin-bottom: 10px; font-weight: 800;
            color: #fff; text-shadow: 0 0 20px rgba(245, 158, 11, 0.8);
        }
        
        #login-screen {
            text-align: center; padding: 40px;
            background: var(--card-bg); border-radius: 16px;
            border: 1px solid rgba(245, 158, 11, 0.3); backdrop-filter: blur(10px);
        }

        .btn-google {
            background-color: #fff; color: #333;
            padding: 12px 24px; border-radius: 8px; border: none;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin: 0 auto; transition: 0.2s;
        }
        .btn-google:hover { background-color: #f1f1f1; }

        #app-screen { display: none; }

        .user-info {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; background: rgba(0,0,0,0.6);
            padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
        }
        .user-details { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .btn-logout { background: none; border: 1px solid #666; color: #ccc; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        .input-card, .message-card {
            background: var(--card-bg);
            border: 1px solid rgba(245, 158, 11, 0.15);
            backdrop-filter: blur(12px); padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }
        
        textarea {
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid #574c41; border-radius: 8px;
            font-family: inherit; font-size: 1rem; color: #fff;
            box-sizing: border-box; resize: vertical; min-height: 100px;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .file-upload-wrapper {
            margin-top: 10px; display: flex; align-items: center; gap: 10px;
        }
        .custom-file-upload {
            border: 1px solid #574c41; display: inline-block; padding: 8px 12px;
            cursor: pointer; border-radius: 8px; font-size: 0.9rem; background: rgba(0,0,0,0.3);
            color: #ccc; transition: 0.2s;
        }
        .custom-file-upload:hover { background: rgba(255,255,255,0.1); color: #fff; }
        #image-preview { max-width: 100px; max-height: 100px; border-radius: 8px; display: none; margin-left: 10px; border: 1px solid var(--accent); object-fit: cover;}
        input[type="file"] { display: none; }

        .btn-send {
            width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 8px;
            background: linear-gradient(to right, #b91c1c, #d97706);
            color: #fff; font-weight: 700; cursor: pointer;
        }

        .message-card { position: relative; animation: fadeIn 0.5s ease; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .user-name { font-weight: 700; color: #fcd34d; }
        .timestamp { font-size: 0.75rem; color: #a8a29e; }
        
        .post-image { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .message-content a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); }
        .message-content a:hover { color: #fff; border-bottom: 1px solid #fff; }

        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            background: var(--dislike); color: white; border: none;
            width: 24px; height: 24px; border-radius: 50%;
            cursor: pointer; font-weight: bold; font-size: 12px;
            display: none; align-items: center; justify-content: center; z-index: 10;
        }

        /* --- AKSİYON BAR --- */
        .post-actions {
            margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
        }
        
        .btn-action {
            background: transparent; border: none; color: var(--muted);
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            font-size: 0.85rem; padding: 6px; border-radius: 6px; transition: 0.2s;
        }
        .btn-action:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-action svg { width: 18px; height: 18px; fill: currentColor; }
        .btn-action.liked { color: var(--accent); }
        .btn-action.disliked { color: var(--dislike); }
        .count-text { font-size: 0.8rem; font-weight: 600; }

        /* REACTION WRAPPER */
        .reaction-wrapper {
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: -10px; 
        }

        /* EMOJİ POPUP */
        .reaction-popup {
            position: absolute;
            bottom: 35px; 
            left: 0;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 5px 10px;
            display: flex; gap: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            opacity: 0; 
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; 
            z-index: 50;
        }

        .reaction-popup::after {
            content: '';
            position: absolute; bottom: -15px; left: 0; width: 100%; height: 20px; background: transparent;
        }

        .reaction-wrapper:hover .reaction-popup, 
        .reaction-popup:hover {
            opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto;
        }

        .btn-emoji-select {
            background: transparent; border: none; cursor: pointer;
            font-size: 1.6rem; transition: transform 0.2s; padding: 0 5px;
            display: flex; align-items: center;
        }
        .btn-emoji-select:hover { transform: scale(1.3); }

        /* --- SEÇİLİ EMOJİ GÖRÜNÜMÜ (GÜNCELLENDİ) --- */
        /* Artık .btn-action ile aynı stilde */
        .selected-reaction {
            background: transparent; 
            border: none; 
            color: var(--muted);
            cursor: pointer; 
            display: flex; align-items: center; gap: 4px;
            font-size: 0.85rem; padding: 6px; 
            border-radius: 6px; 
            transition: 0.2s;
            font-weight: normal; /* Kalın yazı kaldırıldı */
        }
        
        /* Hover olunca beyazlaşsın */
        .reaction-wrapper:hover .selected-reaction {
            background: rgba(255,255,255,0.1); 
            color: #fff;
        }
        
        /* Seçili olunca altın sarısı (Glowing) */
        .selected-reaction.glowing {
            color: var(--accent);
            background: rgba(245, 158, 11, 0.15); /* Hafif sarı arka plan */
        }

        /* Yorum Bölümü */
        .comments-section {
            display: none; margin-top: 15px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; width: 100%;
        }
        .comment-list { margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .single-comment {
            background: var(--comment-bg); padding: 8px 12px; border-radius: 6px; font-size: 0.9rem;
        }
        .comment-header { font-size: 0.75rem; color: #aaa; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .comment-author { color: #fcd34d; font-weight: 600; }
        .comment-input-area { display: flex; gap: 10px; }
        .comment-input {
            flex: 1; padding: 8px; background: rgba(0,0,0,0.4); border: 1px solid #555;
            border-radius: 6px; color: #fff; min-height: 40px; resize: none;
        }
        .btn-comment-send {
            background: var(--accent); color: #000; border: none; padding: 0 15px;
            border-radius: 6px; font-weight: bold; cursor: pointer;
        }

        .site-footer {
            position: fixed; bottom: 15px; width: 100%; text-align: center;
            z-index: 100; pointer-events: none;
        }
        .site-footer a {
            pointer-events: auto; color: rgba(255, 255, 255, 0.5); text-decoration: none;
            font-size: 0.9rem; font-weight: 600; background: rgba(0, 0, 0, 0.4);
            padding: 6px 14px; border-radius: 20px; transition: all 0.3s ease;
        }
        .site-footer a:hover {
            color: #fff; background: rgba(0, 0, 0, 0.8);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        #online-panel {
            position: fixed; bottom: 50px; left: 20px;
            background: rgba(0,0,0,0.7); border: 1px solid #333;
            padding: 15px; border-radius: 12px; z-index: 90;
            width: 200px; backdrop-filter: blur(10px);
            display: none; font-size: 0.85rem;
        }
        #online-panel h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 0.95rem; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .online-user-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .online-user-item img { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #fff; }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-left: auto; box-shadow: 0 0 5px #22c55e; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video" poster="https://images.unsplash.com/photo-1544275822-19d9b6851f5e?q=80&w=1600&auto=format&fit=crop">
        <source src="video.mp4" type="video/mp4">
    </video>
    
    <div class="overlay"></div>
    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <header>
            <h1>Yılbaşı 2026</h1>
            <p>Miyavs topluluğu anı duvarı.</p>
        </header>

        <div id="login-screen">
            <p style="margin-bottom: 20px;">Mesaj yazmak ve etkileşim için giriş yapmalısın.</p>
            <button class="btn-google" id="google-login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Google ile Giriş Yap
            </button>
        </div>

        <div id="app-screen">
            <div class="user-info">
                <div class="user-details">
                    <img id="current-user-img" class="user-avatar" src="" alt="">
                    <div style="display:flex; flex-direction:column; justify-content:center;">
                        <span id="current-user-name" style="font-weight:700; font-size:0.95rem;">Kullanıcı</span>
                        <span id="user-post-count" style="font-size:0.75rem; color:#ccc;">0 Mesaj</span>
                    </div>
                </div>
                <button class="btn-logout" id="logout-btn">Çıkış</button>
            </div>

            <div class="input-card">
                <textarea id="content" placeholder="Buraya bir anı bırak..."></textarea>
                
                <div class="file-upload-wrapper">
                    <label for="image-input" class="custom-file-upload">
                        📷 Resim Ekle 
                    </label>
                    <input id="image-input" type="file" accept="image/*" />
                    <img id="image-preview" src="" alt="Önizleme">
                </div>

                <button class="btn-send" id="send-btn">Mesajı Gönder</button>
            </div>

            <div id="message-list"></div>
        </div>
    </div>

    <div id="online-panel">
        <h3>🟢 Aktif Kişiler</h3>
        <div id="online-users-list"></div>
    </div>

    <div class="site-footer">
        <a href="https://www.instagram.com/hsyntznr" target="_blank">Made by @hsyntznr</a>
    </div>

    <script type="module">
        const ADMIN_EMAIL = "husosude1903@gmail.com"; 

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc, serverTimestamp, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBJfj3-ZVw36LtWJUJpF9kxN8jplOpcjo",
            authDomain: "yilbasiforum.firebaseapp.com",
            projectId: "yilbasiforum",
            storageBucket: "yilbasiforum.firebasestorage.app",
            messagingSenderId: "1015776586858",
            appId: "1:1015776586858:web:a714be75a9f2d6c446ae13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const loginBtn = document.getElementById('google-login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const sendBtn = document.getElementById('send-btn');
        const contentInput = document.getElementById('content');
        const imageInput = document.getElementById('image-input');
        const imagePreview = document.getElementById('image-preview');
        const messageList = document.getElementById('message-list');
        const userNameDisplay = document.getElementById('current-user-name');
        const userImgDisplay = document.getElementById('current-user-img');
        const userPostCountDisplay = document.getElementById('user-post-count'); 
        const onlinePanel = document.getElementById('online-panel');
        const onlineUsersList = document.getElementById('online-users-list');

        let currentUser = null;
        let heartbeatInterval = null;

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch((error) => alert("Giriş hatası: " + error.message));
        });

        logoutBtn.addEventListener('click', () => {
            if(currentUser) deleteDoc(doc(db, "online_users", currentUser.uid));
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginScreen.style.display = 'none';
                appScreen.style.display = 'block';
                onlinePanel.style.display = 'block';
                userNameDisplay.textContent = user.displayName;
                userImgDisplay.src = user.photoURL;
                
                listenForMessages();
                startHeartbeat(user);
                listenOnlineUsers();
                listenUserStats(user.email); 
            } else {
                currentUser = null;
                loginScreen.style.display = 'block';
                appScreen.style.display = 'none';
                onlinePanel.style.display = 'none';
                messageList.innerHTML = '';
                if(heartbeatInterval) clearInterval(heartbeatInterval);
            }
        });

        function listenUserStats(email) {
            const q = query(collection(db, "posts"), where("email", "==", email));
            onSnapshot(q, (snapshot) => {
                const count = snapshot.size;
                userPostCountDisplay.textContent = `${count} Mesaj`;
            });
        }

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if(file) {
                if (file.size > 2097152) { 
                    alert("Resim boyutu çok büyük! Lütfen 2MB altında bir resim seçin.");
                    this.value = ""; 
                    imagePreview.style.display = "none";
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = "block";
                }
                reader.readAsDataURL(file);
            } else {
                imagePreview.style.display = "none";
            }
        });

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 800; 
                        const scaleSize = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                        resolve(dataUrl);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }

        sendBtn.addEventListener('click', async () => {
            const text = contentInput.value.trim();
            const file = imageInput.files[0];

            if (!text && !file) return;

            sendBtn.disabled = true;
            sendBtn.textContent = "Yükleniyor...";

            try {
                let imageUrl = null;
                if (file) {
                    try {
                        imageUrl = await compressImage(file);
                    } catch (err) {
                        alert("Resim hatası."); sendBtn.disabled = false; return;
                    }
                }

                await addDoc(collection(db, "posts"), {
                    name: currentUser.displayName,
                    email: currentUser.email,
                    content: text,
                    imageUrl: imageUrl, 
                    likes: [], dislikes: [],
                    react_laugh: [], react_sad: [], react_angry: [], react_wow: [], react_love: [],
                    timestamp: serverTimestamp(),
                    timeString: new Date().toLocaleDateString('tr-TR') + ' • ' + new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})
                });

                contentInput.value = '';
                imageInput.value = '';
                imagePreview.style.display = 'none';
                sendBtn.disabled = false;
                sendBtn.textContent = "Mesajı Gönder";

            } catch (e) { 
                alert("Hata: " + e.message); 
                sendBtn.disabled = false;
                sendBtn.textContent = "Mesajı Gönder";
            }
        });

        function linkify(text) {
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
        }

        function startHeartbeat(user) {
            updatePresence(user);
            heartbeatInterval = setInterval(() => { updatePresence(user); }, 60000);
            window.addEventListener('beforeunload', () => { deleteDoc(doc(db, "online_users", user.uid)); });
        }

        async function updatePresence(user) {
            try {
                await setDoc(doc(db, "online_users", user.uid), {
                    name: user.displayName, photo: user.photoURL, lastActive: serverTimestamp()
                });
            } catch(e) {}
        }

        function listenOnlineUsers() {
            const q = query(collection(db, "online_users"));
            onSnapshot(q, (snapshot) => {
                if(!onlineUsersList) return;
                onlineUsersList.innerHTML = "";
                const now = new Date();
                snapshot.forEach((docSnap) => {
                    const u = docSnap.data();
                    let isOnline = false;
                    if(u.lastActive) {
                        const diff = (now - u.lastActive.toDate()) / 1000;
                        if(diff < 180) isOnline = true;
                        else deleteDoc(docSnap.ref);
                    }
                    if(isOnline) {
                        onlineUsersList.innerHTML += `
                            <div class="online-user-item">
                                <img src="${u.photo}" alt="user">
                                <span>${escapeHtml(u.name)}</span>
                                <div class="online-dot"></div>
                            </div>`;
                    }
                });
                if(onlineUsersList.innerHTML === "") onlineUsersList.innerHTML = "<div style='color:#aaa;'>Kimse yok :(</div>";
            });
        }

        function listenForMessages() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                messageList.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    createPostElement(docSnap.data(), docSnap.id);
                });
            });
        }

        function createPostElement(post, id) {
            const div = document.createElement('div');
            div.className = 'message-card';

            let deleteButtonHTML = '';
            if (currentUser && currentUser.email === ADMIN_EMAIL) {
                deleteButtonHTML = `<button class="delete-btn" onclick="deletePost('${id}')" style="display:flex;">X</button>`;
            }

            let imageHTML = '';
            if (post.imageUrl) {
                imageHTML = `<img src="${post.imageUrl}" class="post-image" alt="Post Resmi">`;
            }

            const safeContent = escapeHtml(post.content);
            const linkedContent = linkify(safeContent);

            // LIKE DISLIKE
            const likes = post.likes || [];
            const dislikes = post.dislikes || [];
            const userLiked = likes.includes(currentUser.uid) ? 'liked' : '';
            const userDisliked = dislikes.includes(currentUser.uid) ? 'disliked' : '';
            const likeCount = likes.length > 0 ? likes.length : '';
            const dislikeCount = dislikes.length > 0 ? dislikes.length : '';

            // EMOJI TESPİTİ ve AYRI AYRI SAYILAR
            let activeParts = []; // "😂 2", "❤️ 1" gibi parçaları tutacak
            let userHasReacted = false;

            const reactions = [
                { key: 'react_laugh', icon: '😂' },
                { key: 'react_sad', icon: '😢' },
                { key: 'react_angry', icon: '😡' },
                { key: 'react_wow', icon: '😮' },
                { key: 'react_love', icon: '❤️' }
            ];

            reactions.forEach(r => {
                const arr = post[r.key] || [];
                const count = arr.length;
                
                if (count > 0) {
                    activeParts.push(`<span style="margin-right:6px;">${r.icon} ${count}</span>`);
                }

                if (arr.includes(currentUser.uid)) {
                    userHasReacted = true;
                }
            });

            // Buton Görüntüsü
            let reactionBtnContent = `<span>Tepki Ver</span>`;
            let reactionBtnClass = '';

            if (userHasReacted) reactionBtnClass = 'glowing';

            if (activeParts.length > 0) {
                // Parçaları birleştir: 😂 2  ❤️ 1  😮 3
                reactionBtnContent = activeParts.join(''); 
            }

            div.innerHTML = `
                ${deleteButtonHTML}
                <div class="card-header">
                    <span class="user-name">${escapeHtml(post.name)}</span>
                    <span class="timestamp">${post.timeString}</span>
                </div>
                <div class="message-content" style="line-height:1.5; white-space: pre-wrap;">${linkedContent}</div>
                ${imageHTML}
                
                <div class="post-actions">
                    <button class="btn-action ${userLiked}" id="like-btn-${id}">
                        <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.01-.01L23 10z"/></svg>
                        <span class="count-text">${likeCount}</span>
                    </button>
                    <button class="btn-action ${userDisliked}" id="dislike-btn-${id}">
                        <svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v1.91l.01.01L1 14c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
                        <span class="count-text">${dislikeCount}</span>
                    </button>

                    <div class="reaction-wrapper">
                        <div class="selected-reaction ${reactionBtnClass}" style="cursor:pointer; font-size:0.9rem;">
                            ${reactionBtnContent}
                        </div>

                        <div class="reaction-popup">
                            <button class="btn-emoji-select" onclick="handleEmoji('${id}', 'react_laugh')">😂</button>
                            <button class="btn-emoji-select" onclick="handleEmoji('${id}', 'react_sad')">😢</button>
                            <button class="btn-emoji-select" onclick="handleEmoji('${id}', 'react_angry')">😡</button>
                            <button class="btn-emoji-select" onclick="handleEmoji('${id}', 'react_wow')">😮</button>
                            <button class="btn-emoji-select" onclick="handleEmoji('${id}', 'react_love')">❤️</button>
                        </div>
                    </div>

                    <div style="flex-grow:1;"></div>
                    <button class="btn-action" id="btn-toggle-${id}">
                        💬 Yorumlar <span id="comment-count-${id}" style="margin-left:5px; font-weight:bold;"></span>
                    </button>
                </div>

                <div class="comments-section" id="comments-section-${id}">
                    <div class="comment-list" id="list-${id}"></div>
                    <div class="comment-input-area">
                        <textarea class="comment-input" id="input-${id}" placeholder="Yorum yaz..."></textarea>
                        <button class="btn-comment-send" id="send-${id}">Gönder</button>
                    </div>
                </div>
            `;

            messageList.appendChild(div);

            document.getElementById(`like-btn-${id}`).addEventListener('click', () => handleVote(id, 'like'));
            document.getElementById(`dislike-btn-${id}`).addEventListener('click', () => handleVote(id, 'dislike'));
            
            const toggleBtn = document.getElementById(`btn-toggle-${id}`);
            const commentSection = document.getElementById(`comments-section-${id}`);
            toggleBtn.addEventListener('click', () => {
                commentSection.style.display = (commentSection.style.display === 'none' || commentSection.style.display === '') ? 'block' : 'none';
            });

            document.getElementById(`send-${id}`).addEventListener('click', async () => {
                const input = document.getElementById(`input-${id}`);
                const txt = input.value.trim();
                if (!txt) return;
                await addDoc(collection(db, "posts", id, "comments"), {
                    name: currentUser.displayName, text: txt, timestamp: serverTimestamp()
                });
                input.value = '';
            });

            const commentsRef = collection(db, "posts", id, "comments");
            const qComments = query(commentsRef, orderBy("timestamp", "asc"));
            onSnapshot(qComments, (snap) => {
                const listContainer = document.getElementById(`list-${id}`);
                const countBadge = document.getElementById(`comment-count-${id}`);
                const count = snap.size;
                countBadge.textContent = count > 0 ? `(${count})` : "";
                listContainer.innerHTML = ''; 
                snap.forEach(doc => {
                    const c = doc.data();
                    listContainer.innerHTML += `
                        <div class="single-comment">
                            <div class="comment-header"><span class="comment-author">${escapeHtml(c.name)}</span></div>
                            <div>${escapeHtml(c.text)}</div>
                        </div>`;
                });
            });
        }

        window.handleEmoji = async (postId, type) => {
            const postRef = doc(db, "posts", postId);
            const docSnap = await getDoc(postRef);
            if (!docSnap.exists()) return;
            
            const data = docSnap.data();
            const uid = currentUser.uid;
            
            const currentArray = data[type] || [];
            const isAdded = currentArray.includes(uid);

            if (isAdded) {
                await updateDoc(postRef, { [type]: arrayRemove(uid) });
            } else {
                await updateDoc(postRef, {
                    react_laugh: arrayRemove(uid),
                    react_sad: arrayRemove(uid),
                    react_angry: arrayRemove(uid),
                    react_wow: arrayRemove(uid),
                    react_love: arrayRemove(uid)
                });
                await updateDoc(postRef, { [type]: arrayUnion(uid) });
            }
        };

        async function handleVote(postId, type) {
            const postRef = doc(db, "posts", postId);
            const docSnap = await getDoc(postRef);
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            const likes = data.likes || [];
            const dislikes = data.dislikes || [];
            const uid = currentUser.uid;

            if (type === 'like') {
                if (likes.includes(uid)) await updateDoc(postRef, { likes: arrayRemove(uid) });
                else await updateDoc(postRef, { likes: arrayUnion(uid), dislikes: arrayRemove(uid) });
            } else if (type === 'dislike') {
                if (dislikes.includes(uid)) await updateDoc(postRef, { dislikes: arrayRemove(uid) });
                else await updateDoc(postRef, { dislikes: arrayUnion(uid), likes: arrayRemove(uid) });
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        window.deletePost = async (id) => {
            if (confirm("Bu mesajı silmek istediğine emin misin?")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };

        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [], groundHeightMap = []; 
        class Flake {
            constructor(x, y, r, vy, vx) {
                this.x = x; this.y = y; this.r = r; this.vy = vy; this.vx = vx || Math.random() * 1 - 0.5; 
            }
            update() {
                this.y += this.vy; this.x += this.vx;
                let groundLevel = groundHeightMap[Math.floor(this.x)];
                if (this.y + this.r >= groundLevel || this.y + this.r >= height) {
                    accumulateSnow(Math.floor(this.x), this.r * 2); return true;
                } return false;
            }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; ctx.fill(); }
        }
        function init() {
            width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height;
            groundHeightMap = new Array(width).fill(height); flakes = [];
        }
        function accumulateSnow(centerX, amount) {
            const spread = 8; 
            for (let i = -spread; i <= spread; i++) {
                let targetX = centerX + i;
                if (targetX >= 0 && targetX < width) {
                    let increase = amount * (1 - Math.abs(i) / spread) * 0.05;
                    groundHeightMap[targetX] -= increase;
                    if (groundHeightMap[targetX] < height - (height/6.5)) groundHeightMap[targetX] = height - (height/6.5);
                }
            }
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            let maxFlakes = width < 600 ? 150 : 400; 
            while (flakes.length < maxFlakes) flakes.push(new Flake(Math.random() * width, -10, Math.random() * 3 + 1, Math.random() * 2 + 1));
            for (let i = flakes.length - 1; i >= 0; i--) { if (flakes[i].update()) flakes.splice(i, 1); else { flakes[i].draw(); if (flakes[i].x > width + 50) flakes.splice(i, 1); } }
            ctx.beginPath(); ctx.moveTo(0, height); for (let x = 0; x < width; x++) ctx.lineTo(x, groundHeightMap[x]); ctx.lineTo(width, height); ctx.closePath(); ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; ctx.fill();
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init); init(); animate();
    </script>
</body>
</html>
